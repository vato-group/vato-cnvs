name: Release Windows

# Publie un installeur Windows sur GitHub Releases.
#
# Déclencheurs :
#   - push d'un tag vX.Y.Z  → release publique
#   - workflow_dispatch      → release draft (pour tester sans tag)
#
# Permissions : GITHUB_TOKEN est auto-fourni par GitHub Actions ;
# seul `contents: write` est requis pour créer la release.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release-windows:
    name: Release Windows x64
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          shared-key: release-windows

      - name: Install frontend deps
        run: pnpm install --frozen-lockfile

      - name: Build & publish (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: Vato Canvas ${{ github.ref_name }}
          releaseBody: |
            ## Vato Canvas ${{ github.ref_name }} — Windows

            Télécharge l'installeur NSIS (`-setup.exe`) ou le package MSI (`.msi`) ci-dessous.
          releaseDraft: ${{ !startsWith(github.ref, 'refs/tags/') }}
          prerelease: false
